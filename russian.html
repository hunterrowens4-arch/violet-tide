<!DOCTYPE html>
<html lang="eng">
<head>
  
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Russian — Violet Tide</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<link rel='stylesheet' type='text/css' href='style.css'>
  
</head>
<body>
  
<div id='background-wrapper'></div>
<div id='content'>

  <h1>Русский</h1>

  <div class="category-container">

    <!-- Listening Group -->
    <button class="category-button" data-group="listening">Listening ▼</button>
    <div class="sub-buttons-container" id="listening">
      <a href="https://www.youtube.com/c/RussianWithMax" target="_blank"><button class="sub-button">YouTube: Русский с Максом</button></a>
      <a href="https://podcasts.apple.com/us/new" target="_blank"><button class="sub-button">Podcasts</button></a>
      <a href="https://music.apple.com/us/playlist/top-100-russia/pl.728bd30a9247487c80a483f4168a9dcd" target="_blank"><button class="sub-button">Apple Music | Russian Top 100</button></a>
      <a href="https://youtube.com/playlist?list=PLyeD0S2WQHeyUH-1eL2h3ZccHtCcqDxK9&si=gYOBxgq88fXeNB-Q" target="_blank"><button class="sub-button">YouTube Music Playlist</button></a>
      <a href="https://www.netflix.com" target="_blank"><button class="sub-button">Subtitled TV / Movies</button></a>
    </div>

    <!-- Reading Group -->
    <button class="category-button" data-group="reading">Reading ▼</button>
    <div class="sub-buttons-container" id="reading">
      <a href="https://lingua.com" target="_blank"><button class="sub-button">Lingua Short Stories</button></a>
      <a href="https://rt.com" target="_blank"><button class="sub-button">News in Russian</button></a>
    </div>

    <!-- Practice Group -->
    <button class="category-button" data-group="practice">Practice ▼</button>
    <div class="sub-buttons-container" id="practice">
      <a href="https://www.duolingo.com" target="_blank"><button class="sub-button">Duolingo</button></a>
      <a href="https://apps.ankiweb.net" target="_blank"><button class="sub-button">Anki / Flashcards</button></a>
      <a href="https://docs.google.com" target="_blank"><button class="sub-button">Writing Practice / Journal</button></a>
    </div>

    <!-- Reference Group -->
    <button class="category-button" data-group="reference">Reference ▼</button>
    <div class="sub-buttons-container" id="reference">
      <a href="https://www.gramota.ru" target="_blank"><button class="sub-button">Grammar Reference</button></a>
      <a href="https://www.reverso.net" target="_blank"><button class="sub-button">Translator / Dictionary</button></a>
    </div>

    <!-- Back to main homepage -->
    <a href="index.html"><button class="category-button back-button">Back to Home</button></a>

  </div>
</div>

<script>

// initial scroll to collapse blank space on casi-app interface
document.addEventListener("DOMContentLoaded", function() {
  window.scrollTo(0, 47);
});
  
// Floating particles
  const wrapper = document.getElementById('background-wrapper');
  for (let i = 0; i < 20; i++) {
    const particle = document.createElement('div');
    particle.classList.add('particle');

    const size = Math.random() * 10 + 5;
    particle.style.width = particle.style.height = `${size}px`;

    // random horizontal start
    const startX = Math.random() * 100;
    particle.style.left = `${startX}vw`;

    // random vertical start
    const startY = Math.random() * 100;
    particle.style.top = `${startY}vh`;

    // random animation duration and delay
    particle.style.animationDuration = `${10 + Math.random() * 20}s`;

    // random horizontal drift (angle)
    const drift = (Math.random() * 2 - 1) * 50;
    particle.style.setProperty('--drift', `${drift}px`);

    wrapper.appendChild(particle);
  }

  // Toggle sub-buttons for each category
  const categoryButtons = document.querySelectorAll('.category-button');

  categoryButtons.forEach(button => {
    button.addEventListener('click', () => {
      const groupId = button.dataset.group;
      if (!groupId) return; // Skip Back button
      const subButtons = document.querySelectorAll(`#${groupId} .sub-button`);
      subButtons.forEach((btn, i) => {
        setTimeout(() => {
          btn.classList.toggle('show');
        }, i * 100);
      });
    });
  });
</script>

</body>
</html>
